name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore ci-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --no-daemon --build-cache --parallel

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/*.apk debug.apk
          cp app/build/outputs/apk/release/*.apk release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.apk
